name: Update README Stats

on:
  schedule:
    - cron: "30 6 * * *" # Roda todo dia às 03:30 BRT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=nalpsa&show_icons=true&theme=tokyonight&count_private=true&locale=pt-br
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate top langs
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=nalpsa&layout=compact&theme=tokyonight&langs_count=10&locale=pt-br
          path: profile/top-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile/*.svg
          git commit -m "chore: update stats cards" || exit 0
          git push
